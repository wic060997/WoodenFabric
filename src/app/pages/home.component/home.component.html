<div class="main-wrapper" [style.backgroundImage]="'url(/background/' + bgImage + ')'">

  <section class="hero">
    <div class="content">
      <h1>WoodenFactory</h1>
      <p class="subtitle">Modernist architecture and design of modular homes</p>
      <div class="actions">
        <a routerLink="/projects" class="btn-glass">View projects</a>
        <a routerLink="/individual" class="btn-glass">Individual project</a>
      </div>
    </div>
  </section>

  <section class="about-container">
    <div class="about-card">
      <div class="about-grid">
        <div class="about-text">
          <span class="label">About us</span>
          <h2>We are creating the future of construction</h2>
          <p>
            At WoodenFactory, we combine a passion for wood with technology.
            Our homes represent a lifestyle based on ecology and minimalism.
          </p>
        </div>
        <div class="about-image">
          <img ngSrc="/background/background1.png" alt="Architektura" class="inner-img" height="1024" width="1024">
        </div>
      </div>
    </div>
  </section>

</div>
